<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>URBAN SURVIVOR: RISE OF THE HOBO</title>
  <!-- Playgama Bridge SDK -->
  <script src="playgama-bridge.js"></script>
</head>

<body>
  <!-- Mesh gradients ambient layer -->
  <div id="bg-mesh"></div>
  <div id="bg-layer"></div>
  
  <div class="dashboard-container">
    <!-- MODERN HUD HEADER -->
    <header class="glass-header">
      <div class="user-profile">
        <div class="avatar-ring">
          <img src="img/person_modern.webp" id="headerAvatar" alt="Avatar" />
        </div>
        <div class="profile-details">
          <span class="user-role" id="careerPill">ПОПРОШАЙКА</span>
          <span class="cycle-count" id="deathCount">ПОПЫТОК: 0</span>
        </div>
      </div>
      <div class="header-actions">
        <div class="header-pill caps-pill" id="capsTop">🪙 0</div>
        <button class="icon-btn" id="settingsBtn" title="НАСТРОЙКИ">⚙️</button>
      </div>
    </header>

    <!-- MAIN APP SCREEN -->
    <main class="app">
      <section class="center">
        <!-- FLOATING HERO CARD -->
        <div class="hero-card">
          <div class="hero-badge-row">
            <span class="goal-tag" id="currentGoal" data-i18n="goal_survive">[ЦЕЛЬ: ВЫЖИТЬ]</span>
            <span class="day-tag" id="day">📅 ДЕНЬ 1</span>
          </div>
          
          <button id="charBtn">
            <img src="img/person_modern.webp" alt="ВЫЖИВШИЙ" />
          </button>
          
          <div class="active-weapon-tag" id="weaponPill">⚔️ КУЛАКИ</div>
        </div>

        <div class="hint" data-i18n="hint_click">КЛИКНИ ПО ГЕРОЮ, ЧТОБЫ ПРОЖИТЬ ДЕНЬ</div>

        <!-- STATS PANEL CARD -->
        <div class="statusBars" id="statusBars">
          <!-- Generated dynamically in ui.js -->
        </div>

        <!-- RESOURCE SLOTS -->
        <div class="res" id="res"></div>
      </section>
    </main>

    <!-- FLOATING DOCK NAVIGATION -->
    <nav class="nav-dock">
      <button class="dock-btn" id="merchantBtn" data-i18n="btn_merchant">РЫНОК</button>
      <button class="dock-btn" id="equipBtn" data-i18n="btn_inventory">ИНВЕНТАРЬ</button>
      <button class="dock-btn" id="craftBtn" data-i18n="btn_synth">КРАФТ</button>
    </nav>

    <!-- MODAL OVERLAYS -->
    <div class="overlay" id="storyModal">
      <div class="modal">
        <h2 id="storySpeaker">СОБЫТИЕ</h2>
        <div class="modal-content-wrap">
          <img id="storyPortrait" src="" alt="Портрет" />
          <div id="storyText" class="scrollable"></div>
        </div>
        <div id="storyChoices" class="choices-stack"></div>
        <button class="btn good" id="storyOk" data-i18n="btn_continue">ДАЛЕЕ</button>
      </div>
    </div>

    <div class="overlay" id="encounterModal">
      <div class="modal">
        <h2 data-i18n="event_warning">ЧТО ТЫ СДЕЛАЕШЬ?</h2>
        <div id="encounterText" class="scrollable"></div>
        <div class="row modal-btn-row">
          <button class="btn good" id="encounterYes" data-i18n="btn_confirm">ДА</button>
          <button class="btn bad" id="encounterNo" data-i18n="btn_cancel">НЕТ</button>
        </div>
      </div>
    </div>

    <div class="overlay" id="battleModal">
      <div class="modal">
        <div class="battle-header">
          <h2 data-i18n="battle_mode">РАЗБОРКА</h2>
          <div class="battle-timer" id="battleTimer">00.0s</div>
        </div>
        <div class="statusBars" id="pBars" style="background: none; border: none; padding: 0;"></div>
        <div class="enemy-card">
          <div id="enemyName">—</div>
          <img id="enemyImg" src="" alt="Враг" />
          <div class="bar enemy-bar">
            <div class="fill bg-bad" id="eHp"></div>
          </div>
          <div class="telegraph-sub" id="telegraph" data-i18n="waiting_attack">[ОЖИДАНИЕ]</div>
          <div class="bar enemy-bar">
            <div class="fill bg-ok" id="teleFill"></div>
          </div>
        </div>
        <div class="battle-actions">
          <button class="btn good" id="atk">
            УДАР
            <div class="cd-bar" id="atkFill"></div>
          </button>
          <button class="btn secondary-combat-btn" id="dodge">УВОРОТ</button>
          <button class="btn secondary-combat-btn" id="med">💊</button>
        </div>
        <button class="btn bad" id="retreat" data-i18n="retreat">УБЕЖАТЬ</button>
      </div>
    </div>

    <div class="overlay" id="rewardModal">
      <div class="modal">
        <h2 data-i18n="sys_msg">ДОБЫЧА</h2>
        <div id="rewardText" class="scrollable"></div>
        <div class="reward-actions">
          <button class="btn good" id="rewardOk" data-i18n="btn_accept">ЗАБРАТЬ</button>
          <button class="btn double-reward-btn" id="doubleRewardBtn" data-i18n="btn_double_loot">✖2 [РЕКЛАМА]</button>
        </div>
      </div>
    </div>

    <div class="overlay" id="merchantModal">
      <div class="modal scroll-modal">
        <h2 data-i18n="btn_merchant">РЫНОК</h2>
        <div id="merchantStock" class="scrollable"></div>
        <button class="btn close-btn" id="merchantClose" data-i18n="btn_close_conn">ВЕРНУТЬСЯ</button>
      </div>
    </div>

    <div class="overlay" id="craftModal">
      <div class="modal scroll-modal">
        <h2 data-i18n="btn_synth">МАСТЕРСКАЯ</h2>
        <div id="craftStock" class="scrollable"></div>
        <button class="btn close-btn" id="craftClose" data-i18n="btn_disconnect">ЗАКРЫТЬ</button>
      </div>
    </div>

    <div class="overlay" id="equipModal">
      <div class="modal scroll-modal">
        <h2 data-i18n="btn_inventory">ИНВЕНТАРЬ</h2>
        <div id="equipList" class="scrollable"></div>
        <button class="btn close-btn" id="equipClose" data-i18n="btn_close">ЗАКРЫТЬ</button>
      </div>
    </div>

    <div class="overlay" id="defeatModal">
      <div class="modal defeat-layout">
        <h2 class="warning-title">ФИНАЛ</h2>
        <div class="defeat-skull">💀</div>
        <div class="defeat-details">
          <div id="defeatReason">ПРИЧИНА</div>
          <div id="defeatDays">ПРОЖИТО ДНЕЙ: 0</div>
          <div id="defeatMsg">"ГОРОД ТЕБЯ ПЕРЕЖЕВАЛ..."</div>
        </div>
        <div class="defeat-actions">
          <button class="btn good" id="reviveBtn" data-i18n="btn_revive">ВТОРОЕ ДЫХАНИЕ [РЕКЛАМА]</button>
          <button class="btn bad" id="newRun" data-i18n="btn_new_cycle">НОВАЯ ЖИЗНЬ</button>
        </div>
      </div>
    </div>

    <div class="overlay" id="settingsModal">
      <div class="modal">
        <h2 data-i18n="settings_title">НАСТРОЙКИ</h2>
        <div class="settings-stack">
          <button class="btn" id="muteBtn">🔊 ЗВУК</button>
          <button class="btn" id="tutorialBtn">📖 ПОМОЩЬ</button>
        </div>
        <button class="btn good close-btn" id="settingsClose" data-i18n="btn_close">ЗАКРЫТЬ</button>
      </div>
    </div>

    <div class="toastWrap" id="toasts"></div>
  </div>
  
  <script type="module" src="/js/main.js"></script>
</body>

</html>
