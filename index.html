<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Форпост: Дневной путь</title>
  <style>
    :root {
      --panel: #11160f;
      --panel-soft: #171f15;
      --line: #315133;
      --txt: #b5ff9e;
      --muted: #7eaa78;
      --ok: #6cff81;
      --bad: #ff7b7b;
      --warn: #ffd16b;
      --info: #7ecbff;
      --glow: #6aff88
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #1f2d1f 0%, #0a0f0a 65%);
      font: 15px/1.35 system-ui;
      color: var(--txt);
      text-shadow: 0 0 6px #09120acc;
      position: relative;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(180deg, transparent 0 2px, #0d160d66 2px 4px);
      mix-blend-mode: soft-light;
      opacity: .4
    }

    .app {
      max-width: 560px;
      margin: 0 auto;
      padding: 10px 10px 120px
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 5
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center
    }

    .pill {
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #1b2919;
      font-size: 12px
    }

    h1 {
      font-size: 20px;
      margin: 0
    }

    .center {
      margin-top: 10px;
      min-height: 60vh;
      display: grid;
      place-items: center;
      text-align: center
    }

    #charBtn {
      width: min(100%, 420px);
      height: 300px;
      border-radius: 14px;
      border: 2px solid #4f8052;
      background:
        linear-gradient(180deg, #6f846f 0 28%, #425443 35%, #252f25 58%, #1a211a 100%);
      cursor: pointer;
      overflow: hidden;
      padding: 0;
      position: relative;
      display: block
    }

    #charBtn::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 78% 20%, #dcbe6d88, transparent 30%),
        linear-gradient(180deg, #0000, #0009);
      pointer-events: none
    }

    #charBtn::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 36%;
      background: linear-gradient(180deg, #2d332d 0%, #1d231d 100%);
      border-top: 1px solid #78927855
    }

    #charBtn img {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      width: min(66%, 250px);
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 8px 10px #000) drop-shadow(0 0 8px #9effad66);
      z-index: 2
    }

    #charBtn:active {
      transform: scale(.98)
    }

    .sub {
      color: var(--muted);
      font-size: 13px
    }

    .statusBars {
      margin-top: 12px;
      display: grid;
      gap: 8px;
      text-align: left
    }

    .bar {
      height: 12px;
      background: #0f151d;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden
    }

    .fill {
      height: 100%
    }

    .res {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-top: 10px
    }

    .btn {
      background: #1d2d1c;
      color: var(--txt);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 12px;
      cursor: pointer
    }

    .btn.alt {
      background: #33465f
    }

    .btn.good {
      background: #234836;
      border-color: #3f8d67
    }

    .btn.bad {
      background: #53303a;
      border-color: #8f5562
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: #05080ccf;
      display: none;
      place-items: center;
      z-index: 8;
      padding: 12px
    }

    .overlay.show {
      display: grid
    }

    .battle {
      max-width: 560px;
      width: 100%
    }

    .bars {
      display: grid;
      gap: 6px
    }

    .enemy {
      margin-top: 8px;
      background: #141c27;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 8px
    }

    .toastWrap {
      position: fixed;
      top: 70px;
      right: 8px;
      display: grid;
      gap: 7px;
      z-index: 9
    }

    .toast {
      background: #1f2935;
      border: 1px solid #576d8c;
      border-radius: 8px;
      padding: 8px 10px
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="card top">
      <div class="row">
        <h1>Форпост: Дневной путь</h1>
        <div class="pill" id="day">День 1</div>
        <div class="pill" id="phase">Исследование</div>
      </div>
    </div>

    <div class="card center">
      <div>
        <button id="charBtn" title="Прожить день">
          <img src="img/person.png" alt="Персонаж" />
        </button>
        <div style="margin-top:8px"><b>Клик по персонажу = новый день</b></div>
        <div class="sub" id="statusText">Двигайтесь по пустоши и ищите возможности.</div>

        <div class="statusBars" id="statusBars"></div>
        <div class="res" id="res"></div>
        <div class="merchantDock">
          <button class="btn alt" id="merchantBtn">Торговец пустоши</button>
        </div>
      </div>
    </div>
  </div>

  <div class="overlay" id="encounterModal">
    <div class="card battle">
      <h2 style="margin:0 0 8px">Событие в пустоши</h2>
      <div class="encounterCard" id="encounterText"></div>
      <div class="row" style="margin-top:10px">
        <button class="btn good" id="encounterYes">Взаимодействовать</button>
        <button class="btn alt" id="encounterNo">Пройти мимо</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="battleModal">
    <div class="card battle">
      <div class="row">
        <h2 style="margin:0">Бой</h2>
        <div class="pill" id="battleTimer">00.0с</div>
      </div>
      <div class="bars" id="pBars" style="margin-top:8px"></div>
      <div class="enemy">
        <div id="enemyName">—</div>
        <div class="bar" style="margin-top:5px">
          <div class="fill" id="eHp" style="background:var(--bad);width:0%"></div>
        </div>
        <div class="sub" id="telegraph">АТАКА ЧЕРЕЗ 0.0с</div>
        <div class="bar">
          <div class="fill" id="teleFill" style="background:#ff9d9d;width:0%"></div>
        </div>
      </div>
      <div class="actions">
        <button class="btn" id="atk">Атака</button>
        <button class="btn" id="dodge">Уклон</button>
        <button class="btn" id="med">Аптечка</button>
        <button class="btn alt" id="reload">Перезарядка</button>
        <button class="btn alt" id="volley">Залп</button>
        <button class="btn bad" id="retreat">Отступить</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="rewardModal">
    <div class="card battle">
      <h2 style="margin:0 0 8px">Результат</h2>
      <div id="rewardText"></div>
      <button class="btn good" id="rewardOk" style="margin-top:10px">Продолжить путь</button>
    </div>
  </div>

  <div class="overlay" id="merchantModal">
    <div class="card battle">
      <div class="row">
        <h2 style="margin:0">Торговец</h2>
        <div class="pill" id="merchantCaps">Крышки: 0</div>
      </div>
      <div class="sub" style="margin-top:8px">Обменяйте крышки на припасы.</div>
      <div id="merchantStock"></div>
      <button class="btn" id="merchantClose" style="margin-top:10px">Закрыть</button>
    </div>
  </div>

  <div class="overlay" id="defeatModal">
    <div class="card battle">
      <h2 style="margin:0 0 8px">Поражение</h2>
      <div>Персонаж не пережил вылазку.</div>
      <div class="row" style="margin-top:10px"><button class="btn" id="newRun">Новая попытка</button><button
          class="btn alt" id="loadRun">Загрузить</button></div>
    </div>
  </div>

  <div class="toastWrap" id="toasts" aria-live="polite"></div>

  <script>
    window.GameData = (() => {
      const SAVE_KEY = 'forpost_dayclick_v2';
      const SAVE_VER = 2;
      const ENEMIES = [
        { name: 'Рейдер-рашер', hp: 36, dmg: 8, atk: 3.0, icon: '🏃' },
        { name: 'Щитоносец', hp: 55, dmg: 6, atk: 4.5, armor: 0.25, icon: '🛡️' },
        { name: 'Снайпер', hp: 28, dmg: 14, atk: 5.1, mark: true, icon: '🎯' },
        { name: 'Гончая', hp: 25, dmg: 7, atk: 2.5, icon: '🐕' },
        { name: 'Робот-охранник', hp: 64, dmg: 11, atk: 4.7, armor: 0.2, icon: '🤖' }
      ];
      const ELITE_ENEMIES = [
        { name: 'Альфа-рейдер', hp: 80, dmg: 16, atk: 3.6, armor: 0.2, mark: true, icon: '☠️' },
        { name: 'Штурмовой бот', hp: 120, dmg: 18, atk: 4.0, armor: 0.35, icon: '🦾' }
      ];
      const LOCATIONS = [
        { name: 'Музей технологии', icon: '🏛️', desc: 'Пыльные витрины и закрытый арсенал.', reward: { food: 2, water: 1, materials: 9, ammo: 3, caps: 5 }, danger: 0.36, elite: 0.45 },
        { name: 'Рынок караванов', icon: '🏪', desc: 'Остатки лавок и складов с припасами.', reward: { water: 4, materials: 5, ammo: 2, caps: 8 }, danger: 0.28, elite: 0.33 },
        { name: 'Военный блокпост', icon: '🪖', desc: 'Брошенный рубеж с тяжёлым снаряжением.', reward: { ammo: 7, materials: 6, medkits: 1, caps: 6 }, danger: 0.45, elite: 0.62 },
        { name: 'Логово мутантов', icon: '☢️', desc: 'Опасно, но награда может быть очень высокой.', reward: { food: 4, water: 3, materials: 8, caps: 11 }, danger: 0.52, elite: 0.68 }
      ];
      const SHOP_ITEMS = [
        { key: 'food', label: '🍖 Еда x6', amount: 6, price: 8 },
        { key: 'water', label: '💧 Вода x6', amount: 6, price: 8 },
        { key: 'ammo', label: '🔸 Патроны x14', amount: 14, price: 10 },
        { key: 'medkits', label: '🩹 Аптечка x1', amount: 1, price: 12 },
        { key: 'materials', label: '🧱 Материалы x10', amount: 10, price: 11 }
      ];
      return { SAVE_KEY, SAVE_VER, ENEMIES, ELITE_ENEMIES, LOCATIONS, SHOP_ITEMS };
    })();
  </script>

  <script>
    window.GameState = (() => {
      const D = window.GameData;
      const fresh = () => ({
        v: D.SAVE_VER,
        day: 1,
        phase: 'Исследование',
        dead: false,
        resources: { food: 20, water: 20, materials: 25, ammo: 40, medkits: 3, caps: 20 },
        player: { maxHp: 100, hp: 100, maxMood: 100, mood: 80, maxStab: 100, stability: 100, impulse: 0, dmg: 10 },
        encounter: null,
        combat: { active: false, time: 0, enemy: null, enemyAtk: 0, dodge: 0, cdReload: 0, cdVolley: 0, reward: null }
      });

      let state = fresh();
      const normalize = () => {
        state.resources = state.resources || fresh().resources;
        state.resources.caps = typeof state.resources.caps === 'number' ? state.resources.caps : 0;
        state.player = state.player || fresh().player;
        if (typeof state.player.mood !== 'number') {
          const oldStress = typeof state.player.stress === 'number' ? state.player.stress : 20;
          state.player.maxMood = 100;
          state.player.mood = Math.max(0, Math.min(100, 100 - oldStress));
        }
        state.player.maxMood = 100;
        state.encounter = state.encounter || null;
        state.combat = state.combat || fresh().combat;
      };

      const save = () => localStorage.setItem(D.SAVE_KEY, JSON.stringify(state));
      const load = () => {
        try {
          const raw = localStorage.getItem(D.SAVE_KEY);
          if (!raw) return false;
          state = JSON.parse(raw);
          normalize();
          return true;
        } catch {
          return false;
        }
      };
      return { fresh, get: () => state, set: s => state = s, save, load, normalize };
    })();
  </script>

  <script>
    window.GameUI = (() => {
      const S = window.GameState;
      const $ = s => document.querySelector(s);
      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

      const toast = text => {
        const d = document.createElement('div');
        d.className = 'toast';
        d.textContent = text;
        $('#toasts').appendChild(d);
        setTimeout(() => d.remove(), 2600);
      };

      const renderTop = () => {
        const st = S.get();
        $('#day').textContent = `День ${st.day}`;
        $('#phase').textContent = st.phase;
        $('#res').innerHTML = [
          `🍖 Еда: ${st.resources.food}`,
          `💧 Вода: ${st.resources.water}`,
          `🧱 Материалы: ${st.resources.materials}`,
          `🔸 Патроны: ${st.resources.ammo}`,
          `🩹 Аптечки: ${st.resources.medkits}`,
          `🧢 Крышки: ${st.resources.caps}`
        ].map(x => `<div class='pill'>${x}</div>`).join('');

        const p = st.player;
        $('#statusBars').innerHTML = `
          <div>❤️ HP ${Math.round(p.hp)}/${p.maxHp}<div class='bar'><div class='fill' style='width:${clamp(p.hp / p.maxHp * 100, 0, 100)}%;background:var(--bad)'></div></div></div>
          <div>🙂 Настроение ${Math.round(p.mood)}/${p.maxMood}<div class='bar'><div class='fill' style='width:${clamp(p.mood / p.maxMood * 100, 0, 100)}%;background:var(--ok)'></div></div></div>
        `;
      };

      const renderMain = () => {
        const st = S.get();
        $('#statusText').textContent = st.combat.active
          ? 'Сейчас идёт бой.'
          : 'Путь продолжается. Нажмите на персонажа, чтобы прожить день.';
        $('#charBtn').disabled = st.combat.active || st.dead;
      };

      const renderBattle = () => {
        const st = S.get(), p = st.player, c = st.combat, e = c.enemy;
        if (!e) return;
        $('#battleTimer').textContent = `${c.time.toFixed(1)}с`;
        $('#pBars').innerHTML = `
          <div>❤️ HP ${Math.round(p.hp)}/${p.maxHp}<div class='bar'><div class='fill' style='width:${clamp(p.hp / p.maxHp * 100, 0, 100)}%;background:var(--bad)'></div></div></div>
          <div>🙂 Настроение ${Math.round(p.mood)}/${p.maxMood}<div class='bar'><div class='fill' style='width:${clamp(p.mood / p.maxMood * 100, 0, 100)}%;background:var(--ok)'></div></div></div>
          <div>🛡 Стабильность ${Math.round(p.stability)}/${p.maxStab}<div class='bar'><div class='fill' style='width:${clamp(p.stability / p.maxStab * 100, 0, 100)}%;background:var(--info)'></div></div></div>
          <div>⚡ Импульс ${Math.round(p.impulse)}/100<div class='bar'><div class='fill' style='width:${clamp(p.impulse, 0, 100)}%;background:var(--warn)'></div></div></div>`;

        $('#enemyName').textContent = `${e.icon} ${e.name} (${Math.max(0, Math.round(e.hp))}/${e.maxHp})`;
        $('#eHp').style.width = `${clamp(e.hp / e.maxHp * 100, 0, 100)}%`;
        $('#telegraph').textContent = `АТАКА ЧЕРЕЗ ${Math.max(0, c.enemyAtk).toFixed(1)}с`;
        $('#teleFill').style.width = `${clamp((1 - c.enemyAtk / e.atk) * 100, 0, 100)}%`;
        $('#reload').disabled = c.cdReload > 0;
        $('#volley').disabled = c.cdVolley > 0;
        $('#reload').textContent = c.cdReload > 0 ? `Перезарядка ${c.cdReload.toFixed(1)}с` : 'Перезарядка';
        $('#volley').textContent = c.cdVolley > 0 ? `Залп ${c.cdVolley.toFixed(1)}с` : 'Залп';
      };

      const setEncounterCard = ({ icon, title, desc }) => {
        $('#encounterText').innerHTML = `
          <div class='encounterIcon'>${icon}</div>
          <div>
            <div class='encounterTitle'>${title}</div>
            <div class='encounterDesc'>${desc}</div>
          </div>
        `;
      };

      const show = (id, on) => $(id).classList.toggle('show', on);
      return { $, toast, clamp, renderTop, renderMain, renderBattle, setEncounterCard, show };
    })();
  </script>

  <script>
    (() => {
      const D = window.GameData, S = window.GameState, UI = window.GameUI;
      const rng = () => Math.random();
      const pick = arr => arr[Math.floor(rng() * arr.length)];

      const newEnemy = elite => {
        const st = S.get();
        const source = elite ? D.ELITE_ENEMIES : D.ENEMIES;
        const base = pick(source);
        const scale = elite ? (1 + Math.min(.9, st.day * 0.05)) : (1 + Math.min(.7, st.day * 0.03));
        return {
          ...base,
          elite,
          maxHp: Math.round(base.hp * scale),
          hp: Math.round(base.hp * scale),
          dmg: Math.round(base.dmg * scale)
        };
      };

      const upkeep = () => {
        const st = S.get(), p = st.player;
        st.resources.food = Math.max(0, st.resources.food - 2);
        st.resources.water = Math.max(0, st.resources.water - 2);

        if (st.resources.food === 0) {
          p.hp -= 7;
          p.mood = Math.max(0, p.mood - 10);
          UI.toast('Закончилась еда: HP и настроение падают.');
        }
        if (st.resources.water === 0) {
          p.hp -= 10;
          p.mood = Math.max(0, p.mood - 14);
          UI.toast('Закончилась вода: HP и настроение падают сильнее.');
        }

        p.mood = Math.max(0, p.mood - 1.5);
        p.stability = Math.min(p.maxStab, p.stability + 6);
        if (p.mood < 25) p.hp -= 2;

        if (p.hp <= 0) defeat();
      };

      const encounterRoll = () => {
        const st = S.get();
        const enemyChance = Math.min(.65, .24 + st.day * 0.018);
        const locationChance = 0.34;
        const roll = rng();
        if (roll < enemyChance) return { type: 'enemy', enemy: newEnemy(false) };
        if (roll < enemyChance + locationChance) return { type: 'location', location: pick(D.LOCATIONS) };
        return { type: 'calm' };
      };

      const applyReward = reward => {
        const st = S.get();
        Object.entries(reward).forEach(([key, value]) => {
          st.resources[key] = (st.resources[key] || 0) + value;
        });
      };

      const renderMerchant = () => {
        const st = S.get();
        UI.$('#merchantCaps').textContent = `Крышки: ${st.resources.caps}`;
        UI.$('#merchantStock').innerHTML = D.SHOP_ITEMS.map((item, i) => `
          <div class='shopItem'>
            <div>${item.label} <span class='sub'>(цена: ${item.price} крышек)</span></div>
            <button class='btn good' data-buy='${i}'>Купить</button>
          </div>
        `).join('');

        UI.$('#merchantStock').querySelectorAll('[data-buy]').forEach(btn => {
          btn.onclick = () => {
            const product = D.SHOP_ITEMS[Number(btn.dataset.buy)];
            if (!product) return;
            if (st.resources.caps < product.price) {
              UI.toast('Недостаточно крышек.');
              return;
            }
            st.resources.caps -= product.price;
            st.resources[product.key] = (st.resources[product.key] || 0) + product.amount;
            UI.toast(`Куплено: ${product.label}`);
            S.save();
            UI.renderTop();
            renderMerchant();
          };
        });
      };

      const startDay = () => {
        const st = S.get();
        if (st.combat.active || st.dead) return;
        st.day++;
        st.phase = 'Исследование';
        upkeep();
        if (st.dead) return;

        const event = encounterRoll();
        if (event.type === 'enemy') {
          st.encounter = event;
          UI.setEncounterCard({
            icon: event.enemy.icon,
            title: `Контакт: ${event.enemy.name}`,
            desc: 'Визор засёк враждебную цель. Вступить в бой или обойти?',
          });
          UI.$('#encounterYes').textContent = 'Вступить в бой';
          UI.$('#encounterNo').textContent = 'Обойти стороной';
          st.phase = 'Контакт';
          UI.show('#encounterModal', true);
        } else if (event.type === 'location') {
          st.encounter = event;
          UI.setEncounterCard({
            icon: event.location.icon,
            title: `Локация: ${event.location.name}`,
            desc: event.location.desc || 'Есть шанс найти припасы, но может быть опасно.',
          });
          UI.$('#encounterYes').textContent = 'Исследовать';
          UI.$('#encounterNo').textContent = 'Не рисковать';
          st.phase = 'Разведка';
          UI.show('#encounterModal', true);
        } else {
          const calmReward = { materials: 2 + Math.floor(rng() * 3), ammo: 1 + Math.floor(rng() * 2), caps: 1 + Math.floor(rng() * 3) };
          applyReward(calmReward);
          UI.toast(`Спокойный день: найдено немного ресурсов и ${calmReward.caps} крышек.`);
        }

        S.save();
        UI.renderTop();
        UI.renderMain();
      };

      const beginFight = () => {
        const st = S.get(), c = st.combat, e = c.enemy;
        if (!e) return;
        UI.show('#encounterModal', false);
        c.active = true;
        c.time = 0;
        c.enemyAtk = 1.5;
        c.dodge = 0;
        c.cdReload = 0;
        c.cdVolley = 0;
        c.lastTs = 0;
        st.phase = 'Бой';
        UI.show('#battleModal', true);
        tick(performance.now());
      };

      const resolveLocationExplore = () => {
        const st = S.get();
        const loc = st.encounter?.location;
        if (!loc) return;

        applyReward(loc.reward);
        UI.toast(`${loc.name}: найдено припасов.`);

        if (rng() < loc.danger) {
          const elite = rng() < loc.elite;
          st.combat.enemy = newEnemy(elite);
          st.phase = 'Засада';
          UI.toast(elite ? 'Засада! Вы наткнулись на элитного противника.' : 'Засада! Противник на месте.');
          beginFight();
          return;
        }

        st.phase = 'Исследование';
      };

      const finishFight = win => {
        const st = S.get(), c = st.combat;
        c.active = false;
        UI.show('#battleModal', false);
        st.phase = 'Исследование';
        let txt = '';

        if (win) {
          const gotMedkit = rng() < 0.24;
          const reward = { materials: 6 + Math.floor(rng() * 6), ammo: 4 + Math.floor(rng() * 5), food: 1, water: 1, caps: 4 + Math.floor(rng() * 5) };
          applyReward(reward);
          if (gotMedkit) st.resources.medkits++;
          txt = `Победа! Получено: 🧱${reward.materials}, 🔸${reward.ammo}, 🍖${reward.food}, 💧${reward.water}, 🧢${reward.caps}${gotMedkit ? ', 🩹1' : ''}`;
        } else {
          st.player.mood = Math.max(0, st.player.mood - 9);
          txt = 'Вы отошли. Потерь больше не было, но настроение упало.';
        }

        c.reward = txt;
        UI.$('#rewardText').textContent = txt;
        UI.show('#rewardModal', true);
        S.save();
        UI.renderTop();
        UI.renderMain();
      };

      const defeat = () => {
        const st = S.get();
        st.dead = true;
        st.combat.active = false;
        UI.show('#battleModal', false);
        UI.show('#defeatModal', true);
        S.save();
      };

      const tick = ts => {
        const st = S.get(), c = st.combat, p = st.player, e = c.enemy;
        if (!c.active || !e || st.dead) return;

        const last = c.lastTs || ts;
        const dt = Math.min(.08, (ts - last) / 1000 || .016);
        c.lastTs = ts;
        c.time += dt;

        c.enemyAtk -= dt;
        if (c.dodge > 0) c.dodge -= dt;
        if (c.cdReload > 0) c.cdReload -= dt;
        if (c.cdVolley > 0) c.cdVolley -= dt;

        if (c.enemyAtk <= 0) {
          if (c.dodge > 0) {
            c.dodge = 0;
            UI.toast('Уклон сработал.');
          } else {
            let dmg = e.dmg;
            if (e.mark) dmg = Math.round(dmg * 1.15);
            p.hp -= dmg;
            p.mood = Math.max(0, p.mood - 2.2);
            if (e.atk > 4.5) p.stability = Math.max(0, p.stability - 8);
            if (p.hp <= 0) {
              defeat();
              return;
            }
          }
          c.enemyAtk = e.atk;
        }

        if (e.hp <= 0) {
          finishFight(true);
          return;
        }

        UI.renderTop();
        UI.renderBattle();
        requestAnimationFrame(tick);
      };

      const actAttack = () => {
        const st = S.get(), p = st.player, c = st.combat, e = c.enemy;
        if (!c.active || !e) return;
        if (st.resources.ammo < 1) return UI.toast('Патроны закончились');
        st.resources.ammo--;
        let dmg = p.dmg + Math.floor(rng() * 5);
        if (rng() < 0.12) dmg = Math.round(dmg * 1.6);
        if (e.armor) dmg = Math.round(dmg * (1 - e.armor));
        e.hp -= Math.max(1, dmg);
        p.impulse = Math.min(100, p.impulse + 8);
        UI.renderTop();
        UI.renderBattle();
      };

      const actDodge = () => {
        const st = S.get();
        if (st.player.impulse < 20) return UI.toast('Нужно 20 импульса');
        st.player.impulse -= 20;
        st.combat.dodge = 1.2;
        UI.renderBattle();
      };

      const actMed = () => {
        const st = S.get();
        if (st.resources.medkits < 1) return UI.toast('Аптечек нет');
        st.resources.medkits--;
        st.player.hp = Math.min(st.player.maxHp, st.player.hp + 24);
        st.player.mood = Math.min(st.player.maxMood, st.player.mood + 6);
        UI.renderTop();
        UI.renderBattle();
      };

      const actReload = () => {
        const st = S.get(), c = st.combat;
        if (c.cdReload > 0) return;
        st.resources.ammo += 8;
        st.player.impulse = Math.min(100, st.player.impulse + 10);
        c.cdReload = 11;
        UI.renderTop();
        UI.renderBattle();
      };

      const actVolley = () => {
        const st = S.get(), c = st.combat, e = c.enemy;
        if (c.cdVolley > 0 || !e) return;
        if (st.resources.ammo < 6) return UI.toast('Для залпа нужно 6 патронов');
        st.resources.ammo -= 6;
        e.hp -= Math.round((st.player.dmg + 6) * 1.5);
        c.cdVolley = 16;
        UI.renderTop();
        UI.renderBattle();
      };

      UI.$('#charBtn').onclick = startDay;
      UI.$('#merchantBtn').onclick = () => {
        renderMerchant();
        UI.show('#merchantModal', true);
      };
      UI.$('#merchantClose').onclick = () => UI.show('#merchantModal', false);
      UI.$('#encounterYes').onclick = () => {
        const st = S.get();
        const encounter = st.encounter;
        if (!encounter) return;

        if (encounter.type === 'enemy') {
          st.combat.enemy = encounter.enemy;
          st.encounter = null;
          beginFight();
        } else if (encounter.type === 'location') {
          UI.show('#encounterModal', false);
          resolveLocationExplore();
          st.encounter = null;
          S.save();
          UI.renderTop();
          UI.renderMain();
        }
      };

      UI.$('#encounterNo').onclick = () => {
        const st = S.get();
        st.player.mood = Math.max(0, st.player.mood - 2);
        st.phase = 'Исследование';
        st.encounter = null;
        UI.show('#encounterModal', false);
        S.save();
        UI.renderTop();
        UI.renderMain();
      };

      UI.$('#atk').onclick = actAttack;
      UI.$('#dodge').onclick = actDodge;
      UI.$('#med').onclick = actMed;
      UI.$('#reload').onclick = actReload;
      UI.$('#volley').onclick = actVolley;
      UI.$('#retreat').onclick = () => finishFight(false);

      UI.$('#rewardOk').onclick = () => {
        UI.show('#rewardModal', false);
        const st = S.get();
        st.combat.enemy = null;
        S.save();
        UI.renderMain();
      };

      UI.$('#newRun').onclick = () => {
        S.set(S.fresh());
        UI.show('#defeatModal', false);
        UI.renderTop();
        UI.renderMain();
        S.save();
      };

      UI.$('#loadRun').onclick = () => {
        if (S.load()) {
          UI.show('#defeatModal', false);
          UI.toast('Сохранение загружено');
          UI.renderTop();
          UI.renderMain();
        }
      };

      if (!S.load()) S.set(S.fresh());
      S.normalize();
      UI.renderTop();
      UI.renderMain();
      renderMerchant();
      S.save();
    })();
  </script>
</body>

</html>
