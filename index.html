<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>URBAN SURVIVOR: RISE OF THE HOBO</title>
  <!-- Playgama Bridge SDK -->
  <script src="playgama-bridge.js"></script>
</head>

<body>
  <div id="bg-layer"></div>
  <div class="crt-container">
    <header class="hud">
      <div class="hud-top">
        <div class="titleBlock">
          <h1 id="currentGoal" data-i18n="goal_survive">[ЦЕЛЬ: ВЫЖИТЬ]</h1>
          <div class="sub" id="deathCount" data-i18n="cycles">ПОПЫТОК: 0</div>
        </div>
      </div>
      <div class="row">
        <div class="pill" id="day">📅 <span data-i18n="day_label">ДЕНЬ 1</span></div>
        <div class="pill" id="careerPill">💼 ПОПРОШАЙКА</div>
        <div class="pill capsTop" id="capsTop">🪙 0</div>
        <div class="pill" id="weaponPill">⚔️ КУЛАКИ</div>
        <button class="pill pill-btn" id="settingsBtn" title="НАСТРОЙКИ">⚙️</button>
      </div>
    </header>

    <main class="app">
      <section class="center">
        <button id="charBtn">
          <img src="img/person_modern.png" alt="ВЫЖИВШИЙ" />
        </button>
        <div class="hint" data-i18n="hint_click">КЛИКНИ ПО ГЕРОЮ, ЧТОБЫ ПРОЖИТЬ ДЕНЬ</div>
        <div class="statusBars" id="statusBars">
          <!-- Генерируется динамически в ui.js с новой структурой -->
        </div>
        <div class="res" id="res"></div>
        <div class="actionsRow">
          <button class="pill pill-btn" id="merchantBtn" data-i18n="btn_merchant">РЫНОК</button>
          <button class="pill pill-btn" id="equipBtn" data-i18n="btn_inventory">ИНВЕНТАРЬ</button>
          <button class="pill pill-btn" id="craftBtn" data-i18n="btn_synth">КРАФТ</button>
        </div>
      </section>
    </main>

    <!-- МОДАЛЬНЫЕ ОКНА -->
    <div class="overlay" id="storyModal">
      <div class="modal">
        <h2 id="storySpeaker">СОБЫТИЕ</h2>
        <div style="display: flex; flex-direction: column; gap: 1rem; align-items: center;">
          <img id="storyPortrait" src="" alt="Портрет"
            style="width: 100%; max-height: 200px; border-radius: 20px; display: none; object-fit: cover;" />
          <div id="storyText" class="scrollable" style="text-align: center; font-size: 1rem; opacity: 0.9;"></div>
        </div>
        <div id="storyChoices" class="row" style="flex-direction: column; width: 100%;"></div>
        <button class="btn good" id="storyOk" data-i18n="btn_continue">ДАЛЕЕ</button>
      </div>
    </div>

    <div class="overlay" id="encounterModal">
      <div class="modal">
        <h2 data-i18n="event_warning">ЧТО ТЫ СДЕЛАЕШЬ?</h2>
        <div id="encounterText" class="scrollable" style="text-align: center;"></div>
        <div class="row" style="justify-content:center; width: 100%; margin-top: 1rem;">
          <button class="btn good" id="encounterYes" data-i18n="btn_confirm">ДА</button>
          <button class="btn bad" id="encounterNo" data-i18n="btn_cancel">НЕТ</button>
        </div>
      </div>
    </div>

    <div class="overlay" id="battleModal">
      <div class="modal">
        <div style="display: flex; justify-content: space-between; width: 100%;">
          <h2 data-i18n="battle_mode">РАЗБОРКА</h2>
          <div class="pill" id="battleTimer" style="background: var(--accent);">00.0s</div>
        </div>
        <div class="statusBars" id="pBars" style="background: none; border: none; padding: 0;"></div>
        <div class="enemy">
          <div id="enemyName">—</div>
          <img id="enemyImg" src="" alt="Враг" />
          <div class="bar" style="width: 100%;">
            <div class="fill bg-bad" id="eHp"></div>
          </div>
          <div class="sub" id="telegraph" data-i18n="waiting_attack">[ОЖИДАНИЕ]</div>
          <div class="bar" style="width: 100%;">
            <div class="fill bg-ok" id="teleFill"></div>
          </div>
        </div>
        <div class="row" style="width: 100%;">
          <button class="btn good" id="atk" style="flex: 2; position: relative; overflow: hidden;">
            УДАР
            <div class="cd-bar" style="position: absolute; bottom: 0; left: 0; height: 100%; width: 100%; background: rgba(0,0,0,0.2); transform-origin: left; transform: scaleX(0);" id="atkFill"></div>
          </button>
          <button class="btn" id="dodge" style="background: var(--glass-bg); flex: 1;">УВОРОТ</button>
          <button class="btn" id="med" style="background: var(--glass-bg); flex: 1;">💊</button>
        </div>
        <button class="btn bad" id="retreat" data-i18n="retreat" style="opacity: 0.7;">УБЕЖАТЬ</button>
      </div>
    </div>

    <div class="overlay" id="rewardModal">
      <div class="modal">
        <h2 data-i18n="sys_msg">ДОБЫЧА</h2>
        <div id="rewardText" class="scrollable" style="text-align: center; font-size: 1.2rem; font-weight: 800;"></div>
        <div style="display: flex; flex-direction: column; gap: 0.5rem; width: 100%;">
          <button class="btn good" id="rewardOk" data-i18n="btn_accept">ЗАБРАТЬ</button>
          <button class="btn" id="doubleRewardBtn" data-i18n="btn_double_loot" style="background: var(--secondary); color: #000;">✖2 [РЕКЛАМА]</button>
        </div>
      </div>
    </div>

    <div class="overlay" id="merchantModal">
      <div class="modal" style="max-height: 85vh;">
        <h2 data-i18n="btn_merchant">РЫНОК</h2>
        <div id="merchantStock" class="scrollable" style="width: 100%;"></div>
        <button class="btn" id="merchantClose" data-i18n="btn_close_conn" style="background: var(--glass-bg);">ВЕРНУТЬСЯ</button>
      </div>
    </div>

    <div class="overlay" id="craftModal">
      <div class="modal" style="max-height: 85vh;">
        <h2 data-i18n="btn_synth">МАСТЕРСКАЯ</h2>
        <div id="craftStock" class="scrollable" style="width: 100%;"></div>
        <button class="btn" id="craftClose" data-i18n="btn_disconnect" style="background: var(--glass-bg);">ЗАКРЫТЬ</button>
      </div>
    </div>

    <div class="overlay" id="equipModal">
      <div class="modal" style="max-height: 85vh;">
        <h2 data-i18n="btn_inventory">ИНВЕНТАРЬ</h2>
        <div id="equipList" class="scrollable" style="width: 100%;"></div>
        <button class="btn" id="equipClose" data-i18n="btn_close" style="background: var(--glass-bg);">ЗАКРЫТЬ</button>
      </div>
    </div>

    <div class="overlay" id="defeatModal">
      <div class="modal" style="background: #1a0505; border-color: var(--accent);">
        <h2 style="color: var(--accent); font-size: 2rem;">ФИНАЛ</h2>
        <div style="font-size: 4rem; text-align: center;">💀</div>
        <div style="text-align: center; display: flex; flex-direction: column; gap: 0.5rem;">
          <div id="defeatReason" style="font-weight: 800;">ПРИЧИНА</div>
          <div id="defeatDays" style="opacity: 0.7;">ПРОЖИТО ДНЕЙ: 0</div>
          <div id="defeatMsg" style="font-style: italic; margin-top: 1rem;">"ГОРОД ТЕБЯ ПЕРЕЖЕВАЛ..."</div>
        </div>
        <div style="display: flex; flex-direction: column; gap: 0.5rem; width: 100%;">
          <button class="btn good" id="reviveBtn" data-i18n="btn_revive">ВТОРОЕ ДЫХАНИЕ [РЕКЛАМА]</button>
          <button class="btn bad" id="newRun" data-i18n="btn_new_cycle">НОВАЯ ЖИЗНЬ</button>
        </div>
      </div>
    </div>

    <div class="overlay" id="settingsModal">
      <div class="modal">
        <h2 data-i18n="settings_title">НАСТРОЙКИ</h2>
        <div style="display: flex; flex-direction: column; gap: 0.8rem; width: 100%;">
          <button class="btn" id="muteBtn" style="background: var(--glass-bg);">🔊 ЗВУК</button>
          <button class="btn" id="tutorialBtn" style="background: var(--glass-bg);">📖 ПОМОЩЬ</button>
        </div>
        <button class="btn good" id="settingsClose" data-i18n="btn_close">ЗАКРЫТЬ</button>
      </div>
    </div>

    <div class="toastWrap" id="toasts"></div>
  </div>
  <script type="module" src="/js/main.js"></script>
</body>

</html>
